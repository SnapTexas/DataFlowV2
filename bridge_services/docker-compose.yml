services:
  bridge:
    build: .
    # Maps the current directory on your host to /app inside the container
    volumes:
      - .:/app 
    # Prevents Python from buffering stdout/stderr (crucial for real-time logs)
    environment:
      - PYTHONUNBUFFERED=1
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
    networks:
      - kafka-pipeline
    restart: always

networks:
  kafka-pipeline:
    external: true
    name: kafka_cluster_kafka-net