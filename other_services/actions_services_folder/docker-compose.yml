version: '3.8'

services:
  actions:
    build: .
    container_name: actions_service_v2
    command: ["python", "-u", "actions_service.py"]
    volumes:
      - .:/app 
    environment:
      - PYTHONUNBUFFERED=1
      # Mapping your .env names to the container environment
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
    networks:
      - actions-net
    restart: always

networks:
  actions-net:
    driver: bridge